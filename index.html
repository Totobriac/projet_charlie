    function initSortable() {
      const board = document.getElementById('board');
      new Sortable(board, {
        animation: 200,
        handle: '.col-header, .col-collapsed-view',
        ghostClass: 'sortable-ghost',
        dragClass: 'sortable-drag',
        // ON DIT À SORTABLE D'IGNORER LE BLOC D'AJOUT
        filter: '.add-col-wrap,  .col-menu-btn, .col-collapse-btn',
        draggable: '.column', // On précise que SEULES les colonnes bougent
        onEnd: function (evt) {
          pushHistory(); // On sauvegarde l'état AVANT de faire le changement
          if (evt.oldIndex === evt.newIndex) return;
          const cols = getActiveColumns(); const movedCol = cols.splice(evt.oldIndex, 1)[0];
          cols.splice(evt.newIndex, 0, movedCol);
          saveStateToFirebase();
        }
      });



      document.querySelectorAll('.cards-wrap').forEach(wrap => {

        new Sortable(wrap, {

          group: 'kanban', animation: 200, ghostClass: 'sortable-ghost', dragClass: 'sortable-drag', delay: 50, delayOnTouchOnly: true, draggable: '.card:not(.inline-edit)',

          onEnd: function (evt) {

            if (evt.from === evt.to && evt.oldIndex === evt.newIndex) return;

            const fromCol = getActiveColumns().find(c => c.id === evt.from.dataset.colid);

            const toCol = getActiveColumns().find(c => c.id === evt.to.dataset.colid);

            const cardId = evt.item.dataset.cardId; const cardObj = fromCol.cards.find(c => c.id === cardId);

            fromCol.cards = fromCol.cards.filter(c => c.id !== cardId);

            const newCardIndex = Array.from(evt.to.querySelectorAll('.card')).indexOf(evt.item);

            toCol.cards.splice(newCardIndex, 0, cardObj);

            updateColCounts(); render(); saveStateToFirebase();

          }

        });

      });

    }



    function updateColCounts() { getActiveColumns().forEach(col => { const colEl = document.querySelector(`.column[data-col-id="${col.id}"]`); if (colEl) { colEl.querySelectorAll('.col-count, .col-collapsed-count').forEach(el => el.textContent = col.cards.length); } }); }



    function initPan() {

      const slider = document.querySelector('.board-wrap');

      let isDown = false; let startX; let scrollLeft;

      slider.addEventListener('mousedown', (e) => { if (e.target.closest('.column') || e.target.closest('.add-col-wrap') || e.target.closest('.bg-fab')) return; isDown = true; slider.style.cursor = 'grabbing'; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });

      window.addEventListener('mouseup', () => { isDown = false; slider.style.cursor = ''; });

      slider.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); slider.scrollLeft = scrollLeft - ((e.pageX - slider.offsetLeft) - startX) * 1.5; });

    }



    function renameCol(id, v) { const c = getActiveColumns().find(c => c.id === id); if (c) { c.title = v; saveStateToFirebase(); } }

    function toggleCollapse(id) { const c = getActiveColumns().find(c => c.id === id); if (c) { c.collapsed = !c.collapsed; render(); saveStateToFirebase(); } }

    function openAddCol() { document.getElementById('addColBtn').style.display = 'none'; document.getElementById('newColForm').classList.add('active'); document.getElementById('newColInput').focus() }

    function cancelAddCol() { document.getElementById('addColBtn').style.display = ''; document.getElementById('newColForm').classList.remove('active'); document.getElementById('newColInput').value = '' }

    function colKeydown(e) { if (e.key === 'Enter') confirmAddCol(); if (e.key === 'Escape') cancelAddCol() }

    function confirmAddCol() {

      pushHistory(); // On sauvegarde l'état AVANT de faire le changement

      const inp = document.getElementById('newColInput'); const title = inp.value.trim(); if (!title) return;

      const pal = ['#6366f1', '#f59e0b', '#ef4444', '#10b981', '#ec4899', '#14b8a6'];

      getActiveColumns().push({ id: `col-${nextId++}`, title, color: pal[getActiveColumns().length % pal.length], collapsed: false, cards: [] });

      cancelAddCol(); render(); toast('Liste créée'); saveStateToFirebase();

    }



    function showAddCard(id) { document.getElementById('acb-' + id).style.display = 'none'; document.getElementById('form-' + id).classList.add('active'); document.getElementById('inp-' + id).focus() }

    function cancelAddCard(id) { document.getElementById('acb-' + id).style.display = ''; document.getElementById('form-' + id).classList.remove('active'); document.getElementById('inp-' + id).value = '' }

    function cardKeydown(e, colId) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); confirmAddCard(colId); } else if (e.key === 'Escape') { cancelAddCard(colId); } }

    function confirmAddCard(colId) {

      pushHistory(); // On sauvegarde l'état AVANT de faire le changement

      const inp = document.getElementById('inp-' + colId); const title = inp.value.trim(); if (!title) {
        cancelAddCard(colId);
        return;
      };

      getActiveColumns().find(c => c.id === colId).cards.push({ id: `c${nextId++}`, title, done: false, checks: [], desc: '' });

      cancelAddCard(colId); render(); toast('Carte ajoutée'); saveStateToFirebase();

    }

    function addCardAt(colId, index) { getActiveColumns().find(c => c.id === colId).cards.splice(index, 0, { id: `c${nextId++}`, title: '', done: false, checks: [], desc: '', inlineEdit: true }); render(); }



    const COL_COLORS = ['#6366f1', '#4f46e5', '#8b5cf6', '#ec4899', '#f43f5e', '#ef4444', '#10b981', '#14b8a6', '#f59e0b', '#f97316', '#3b82f6', '#0ea5e9', '#d946ef', '#64748b', '#a1a1aa'];

    let ctxColId = null, ctxCardId = null, ctxCardColId = null;



    function openColMenu(e, colId) {

      e.stopPropagation(); ctxColId = colId; ctxCardId = null;

      const col = getActiveColumns().find(c => c.id === colId);

      const colorGrid = `<div class="ctx-colors">` + COL_COLORS.map(c => `<div class="ctx-color-dot ${col.color === c ? 'active' : ''}" style="background:${c}" onclick="event.stopPropagation(); setColColor('${colId}', '${c}')"></div>`).join('') + `</div>`;

      showCtx(e.clientX, e.clientY, `

    <div style="font-size:11px;font-weight:600;color:var(--text3);padding:4px 10px 6px;text-transform:uppercase;letter-spacing:0.05em">Couleur</div>

    ${colorGrid}<div class="ctx-sep"></div>

    <button class="ctx-item" onclick="ctxRenameCol()">✏️ Renommer</button>

    <button class="ctx-item" onclick="ctxClearCol()">🧹 Vider</button>

    <button class="ctx-item" onclick="ctxColCollapse()">◀ ${col?.collapsed ? 'Développer' : 'Réduire'}</button>

    <div class="ctx-sep"></div><button class="ctx-item danger" onclick="ctxDelCol()">🗑 Supprimer</button>

  `);

    }

    function setColColor(colId, hex) { pushHistory(); col = getActiveColumns().find(c => c.id === colId); if (col) col.color = hex; hideCtx(); render(); saveStateToFirebase(); }



    function openCardCtx(e, cardId, colId) {

      e.stopPropagation(); ctxCardId = cardId; ctxCardColId = colId; ctxColId = null;

      showCtx(e.clientX, e.clientY, `

    <button class="ctx-item" onclick="openModal('${cardId}');hideCtx()">✏️ Modifier</button>

    <button class="ctx-item" onclick="ctxDupCard()">⧉ Dupliquer</button>

    <div class="ctx-sep"></div><button class="ctx-item danger" onclick="deleteCardRaw('${cardId}')">🗑 Supprimer</button>

  `);

    }

    function showCtx(x, y, html) { const m = document.getElementById('ctxMenu'); m.innerHTML = html; m.classList.add('active'); m.style.left = Math.min(x, window.innerWidth - 175) + 'px'; m.style.top = Math.min(y, window.innerHeight - 170) + 'px'; }

    function hideCtx() { document.getElementById('ctxMenu').classList.remove('active') }



    document.addEventListener('click', e => { hideCtx(); if (!e.target.closest('.bg-panel') && !e.target.closest('.bg-fab')) { document.getElementById('bgPanel')?.classList.remove('open'); } });

    /* function ctxRenameCol(){hideCtx();const c=getActiveColumns().find(c=>c.id===ctxColId);if(!c)return;const n=prompt('Nouveau nom :',c.title);if(n?.trim()){c.title=n.trim();render();saveStateToFirebase();}}
     */
    function ctxRenameCol() {
      hideCtx();
      const titleEl = document.getElementById(`title-${ctxColId}`);

      if (titleEl) {
        // On force le style pour effacer le "bleu" du navigateur
        titleEl.style.outline = "none";
        titleEl.style.border = "none";
        titleEl.style.boxShadow = "0 0 0 2px var(--accent)"; // Un contour propre
        titleEl.style.borderRadius = "4px";
        titleEl.style.padding = "2px 6px";
        titleEl.style.backgroundColor = "rgba(255,255,255,0.1)";

        titleEl.contentEditable = "true";
        titleEl.focus();

        // Sélectionne tout le texte
        const range = document.createRange();
        range.selectNodeContents(titleEl);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);

        titleEl.onblur = function () {
          titleEl.contentEditable = "false";
          // On remet le style normal
          titleEl.style.boxShadow = "none";
          titleEl.style.backgroundColor = "transparent";
          renameCol(ctxColId, titleEl.innerText);
        };

        titleEl.onkeydown = function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            titleEl.blur();
          }
        };
      }
    }

    function ctxClearCol() { pushHistory(); const c = getActiveColumns().find(c => c.id === ctxColId); if (c) { c.cards = []; render(); toast('Liste vidée'); saveStateToFirebase(); } }

    function ctxColCollapse() { hideCtx(); toggleCollapse(ctxColId) }

    function ctxDelCol() { pushHistory(); const cols = getActiveColumns(); const i = cols.findIndex(c => c.id === ctxColId); if (i > -1) { cols.splice(i, 1); render(); toast('Liste supprimée'); saveStateToFirebase(); } }

    function ctxDupCard() { hideCtx(); const col = getActiveColumns().find(c => c.id === ctxCardColId); if (!col) return; const i = col.cards.findIndex(c => c.id === ctxCardId); if (i === -1) return; const cl = JSON.parse(JSON.stringify(col.cards[i])); cl.id = `c${nextId++}`; cl.title += ' (copie)'; col.cards.splice(i + 1, 0, cl); render(); toast('Carte dupliquée'); saveStateToFirebase(); }



    function openModal(cardId) {
      const f = findCard(cardId);
      if (!f) return;

      const overlay = document.getElementById('modalOverlay');
      if (!overlay) {
        console.error("Erreur : L'élément 'modalOverlay' est introuvable dans le HTML.");
        return;
      }

      overlay.classList.add('active');
      renderModal(f.card, f.col);
    }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

    function updateModalTitle(id, val) { const f = findCard(id); if (f && val.trim()) { f.card.title = val.trim(); render(); saveStateToFirebase(); } }

    function renderModal(card, col) {
      const checks = card.checks || []; const done = checks.filter(c => c.d).length; const pct = checks.length ? Math.round(done / checks.length * 100) : 0;

      // 1. On injecte le HTML
      document.getElementById('modalContent').innerHTML = `
    <textarea id="modalTitleInput" class="modal-title-input" rows="1" oninput="autoResize(this); updateModalTitle('${card.id}', this.value)">${esc(card.title)}</textarea>
    <div class="modal-col-tag"><span style="width:8px;height:8px;border-radius:50%;background:${col.color};display:inline-block"></span> dans <b style="color:var(--text2);margin-left:4px">${esc(col.title)}</b></div>
    <div class="modal-section">
      <div class="modal-label">Description</div>
      <textarea class="modal-desc" placeholder="Ajouter une description…" onchange="updateDesc('${card.id}',this.value)">${esc(card.desc || '')}</textarea>
    </div>
    <div class="modal-section">
      <div class="modal-label">Checklist${checks.length ? ` <span style="font-weight:400;color:var(--text3);margin-left:6px">${done}/${checks.length} · ${pct}%</span>` : ''}</div>
      ${checks.length ? `<div class="progress-bar"><div class="progress-fill" id="pf" style="width:${pct}%"></div></div>` : ''}
      <div class="checklist">${checks.map((ch, i) => `
        <div class="check-item"><input type="checkbox" id="chk${i}" ${ch.d ? 'checked' : ''} onchange="toggleCheck('${card.id}',${i},this.checked)"><label for="chk${i}">${esc(ch.t)}</label><button class="check-del-btn" onclick="delCheck('${card.id}', ${i})" title="Supprimer">×</button></div>`).join('')}
      </div>
      <input class="add-check-input" placeholder="+ Ajouter un élément…" onkeydown="addCheck(event,'${card.id}')">
    </div>
  `;

      // 2. ON AJOUTE LA LOGIQUE "ENTRÉE" JUSTE ICI :
      const modalTitleInput = document.getElementById('modalTitleInput');
      if (modalTitleInput) {
        // On ajuste la taille au démarrage
        setTimeout(() => autoResize(modalTitleInput), 0);

        // On écoute la touche Entrée
        modalTitleInput.addEventListener('keydown', e => {
          if (e.key === 'Enter') {
            e.preventDefault(); // Empêche le retour à la ligne
            const val = modalTitleInput.value.trim();
            if (val) {
              updateModalTitle(card.id, val);
              closeModal(); // Ferme la modale
              toast("Modifié ✨");
            }
          }
        });
      }
    }

    // Au chargement initial ou si le nom est vide
    function initBoardName() {
      if (!state.boardName) {
        const randomMonkey = monkeyRaces[Math.floor(Math.random() * monkeyRaces.length)];
        state.boardName = "Projet " + randomMonkey;
      }
      document.getElementById('boardTitleDisplay').innerText = state.boardName;
    }

    function updateBoardName(el) {
      const val = el.innerText.trim();
      if (val && val !== state.boardName) {
        pushHistory();
        state.boardName = val;
        saveStateToFirebase(); // Sauvegarde le Kanban interne

        // MAIS AUSSI le champ "name" au niveau supérieur pour le Dashboard
        db.collection('users').doc(currentUser.uid).collection('boards').doc(currentBoardId).update({
          name: val
        });
      } else {
        el.innerText = state.boardName;
      }
    }

    // Appelle initBoardName() dans ta fonction loadDataFromFirebase après avoir reçu le state

    function closeModal() { document.getElementById('modalOverlay').classList.remove('active') }
    function closeBoardActionModal(e) {
      if (e && e.target !== document.getElementById('boardActionModal')) return;
      document.getElementById('boardActionModal').classList.remove('open');
    }

    // Alias for tab system (reuses boardActionModal)
    function showMiniDialog(html) {
      document.getElementById('boardActionContent').innerHTML = html;
      document.getElementById('boardActionModal').classList.add('open');
      setTimeout(() => {
        const inp = document.getElementById('boardActionModal').querySelector('input');
        if (inp) { inp.focus(); inp.select(); }
      }, 60);
    }
    function closeMiniDialog() {
      document.getElementById('boardActionModal').classList.remove('open');
    }

    function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal() }

    function updateDesc(id, v) { const f = findCard(id); if (f) { f.card.desc = v; saveStateToFirebase(); } }

    function toggleCheck(id, i, v) { const f = findCard(id); if (!f) return; f.card.checks[i].d = v; render(); saveStateToFirebase(); }

    function addCheck(e, id) { if (e.key !== 'Enter') return; const v = e.target.value.trim(); if (!v) return; const f = findCard(id); if (!f) return; f.card.checks.push({ t: v, d: false }); e.target.value = ''; renderModal(f.card, f.col); render(); saveStateToFirebase(); }

    function delCheck(cardId, checkIndex) { const f = findCard(cardId); if (!f) return; f.card.checks.splice(checkIndex, 1); renderModal(f.card, f.col); render(); saveStateToFirebase(); }



    const BP_COLORS = [

    ];

      'linear-gradient(135deg, #ADB5BD 0%, #212529 100%)'
    ];

    let activeBpEl = null; let currentBpTab = 'colors';

    function initBgPicker() { renderBpBody() }

    function switchBpTab(tab) { currentBpTab = tab; document.querySelectorAll('.bp-tab').forEach(t => t.classList.remove('active')); document.getElementById('tab-' + tab).classList.add('active'); renderBpBody(); }

    function renderBpBody() {

      const body = document.getElementById('bpBody');

      if (currentBpTab === 'colors') {

        body.innerHTML = '<div class="bp-grid" id="bpGrid"></div><div class="bp-custom"><span class="bp-custom-label">Couleur libre</span><input type="color" class="bp-custom-input" id="bpCustom" value="#0d0f14" oninput="applyBg(this.value,\'solid\',null)"></div>';

        BP_COLORS.forEach(c => { const s = document.createElement('div'); s.className = 'bp-swatch'; s.style.background = c; s.addEventListener('click', () => applyBg(c, 'solid', s)); document.getElementById('bpGrid').appendChild(s); });

      } else {

        body.innerHTML = '<div class="bp-grad-grid" id="bpGGrid"></div>';

        BP_GRADS.forEach(g => { const s = document.createElement('div'); s.className = 'bp-grad'; s.style.background = g; s.addEventListener('click', () => applyBg(g, 'gradient', s)); document.getElementById('bpGGrid').appendChild(s); });

      }

    }

    async function applyBg(value, type, el) {
      document.body.style.background = value;
      state.bg = value; // On le garde en mémoire locale

      if (!currentUser) return;

      try {
        // On enregistre dans un document "settings" pour l'utilisateur
        await db.collection('users').doc(currentUser.uid).set({
          settings: { bg: value }
        }, { merge: true });
      } catch (e) {
        console.error("Erreur sauvegarde background:", e);
      }

      // Gestion visuelle de la sélection dans la palette
      if (activeBpEl) activeBpEl.classList.remove('active');
      if (el) { el.classList.add('active'); activeBpEl = el; }
    }


    initPan();

    initBgPicker();

  </script>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div id="modalContent"></div>
    </div>
  </div>
